<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8KXR - 全动效整合主页</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  scroll-behavior: smooth;
  font-family: 'Consolas', 'Microsoft Yahei', sans-serif;
}

body {
  background: #000;
  color: #fff;
  overflow-x: hidden;
  position: relative;
}

#parallax-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 120%;
  height: 120%;
  background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
  transform: translateZ(-5px) scale(1.2);
  z-index: -2;
  transition: background 1s ease;
}

#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
  opacity: 0.8;
}

.page-title {
  text-align: center;
  padding: 80px 20px 40px;
  font-size: 4rem;
  transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.title-neon {
  background: linear-gradient(90deg, #0ff, #f0f, #ff0);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: neon-flow 3s linear infinite;
}

.title-gradient {
  background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #f5576c);
  background-size: 300% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: gradient-flow 4s ease infinite;
}

.title-3d {
  text-transform: uppercase;
  letter-spacing: 3px;
  color: #ff0;
  text-shadow:
    0 1px 0 #ff0,
    0 2px 0 #ff0,
    0 3px 0 #ff0,
    0 4px 0 #ff0,
    0 5px 0 #ff0,
    0 6px 1px rgba(0,0,0,.2),
    0 0 5px rgba(255,255,0,.5),
    0 1px 3px rgba(255,255,0,.5),
    0 3px 5px rgba(255,255,0,.3),
    0 5px 10px rgba(255,255,0,.4),
    0 10px 10px rgba(255,255,0,.3);
}

@keyframes neon-flow { to { background-position: 200% center; } }
@keyframes gradient-flow { to { background-position: 300% center; } }

.module-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 40px 20px;
  position: relative;
  z-index: 1;
}

.module {
  margin-bottom: 60px;
  border-radius: 20px;
  overflow: hidden;
  transition: all 0.5s ease;
  cursor: pointer;
}

/* ========================== */
/* 霓虹模块：霓虹效果 */
/* ========================== */
.module-neon {
  border: 2px solid #0ff;
  background: rgba(0,0,0,0.7);
}
.module-neon:hover,
.section-item-neon:hover {
  box-shadow: 0 0 30px #0ff, 0 0 60px #0ff;
  border-color: #0ff;
  transform: translateY(-6px);
}

/* ========================== */
/* 渐变模块：渐变效果 */
/* ========================== */
.module-gradient {
  background: linear-gradient(45deg, #667eea, #764ba2);
}
.module-gradient:hover,
.section-item-gradient:hover {
  background: linear-gradient(45deg, #f093fb, #f5576c);
  transform: translateY(-6px);
}

/* ========================== */
/* 3D模块：你最初要的 3D 效果 */
/* ========================== */
.module-3d {
  background: rgba(0,0,0,0.85);
  transform-style: preserve-3d;
  perspective: 1000px;
}
.module-3d:hover,
.section-item-3d:hover {
  transform: rotateY(12deg) rotateX(8deg) translateY(-10px);
  box-shadow: 0 30px 60px rgba(0,0,0,0.7), 0 0 40px rgba(255,255,0,0.3);
}

/* ========================== */
/* 模块封面 */
/* ========================== */
.module-cover {
  display: flex;
  gap: 30px;
  padding: 30px;
  align-items: center;
  transition: all 0.5s ease;
}
.module-cover-img {
  width: 300px;
  height: 200px;
  border-radius: 15px;
  object-fit: cover;
  flex-shrink: 0;
  transition: all 0.5s ease;
}
.module-cover-text h2 {
  font-size: 2.4rem;
  margin-bottom: 12px;
}
.module-cover-text p {
  font-size: 1.1rem;
  opacity: 0.9;
  line-height: 1.6;
}

.cover-title-neon { color: #0ff; text-shadow: 0 0 12px #0ff; }
.cover-title-gradient { color: #fff; text-shadow: 0 0 12px #fff; }
.cover-title-3d { color: #ff0; text-shadow: 0 0 12px #ff0; }

/* ========================== */
/* 小节列表（默认隐藏） */
/* ========================== */
.section-list {
  display: none;
  grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
  gap: 30px;
  padding: 0 30px 40px;
}
.section-list.show {
  display: grid;
  animation: fadeIn 0.6s ease forwards;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ========================== */
/* 小节样式 */
/* ========================== */
.section-item {
  display: flex;
  gap: 20px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(0,0,0,0.4);
  transition: all 0.5s ease;
  cursor: pointer;
}
.section-img {
  width: 200px;
  height: 150px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
  transition: all 0.5s ease;
}
.section-item:hover .section-img {
  transform: scale(1.08);
}
.section-text { flex:1; }
.section-text h3 { font-size:1.4rem; margin-bottom:8px; }
.section-text p { opacity:0.9; line-height:1.6; }
</style>
</head>
<body>

<div id="parallax-bg"></div>
<div id="particles-js"></div>

<h1 class="page-title title-neon" id="pageMainTitle">8KXR 全动效整合主页</h1>

<div class="module-container">

<!-- 霓虹模块 -->
<div class="module module-neon" data-type="neon">
  <div class="module-cover">
    <img class="module-cover-img" src="https://picsum.photos/seed/neon-cover/600/400">
    <div class="module-cover-text">
      <h2 class="cover-title-neon">霓虹特效模块</h2>
      <p>霓虹特效采用CSS发光渐变与阴影，hover时呈现强烈赛博朋克光晕，整体风格统一、丝滑。</p>
    </div>
  </div>
  <div class="section-list">
    <div class="section-item section-item-neon"
         data-action="text"
         data-text-original="霓虹小节1：展示霓虹发光效果。"
         data-text-change="霓虹小节1：已切换文本。">
      <img class="section-img" src="https://picsum.photos/seed/neon1/400/300">
      <div class="section-text">
        <h3>霓虹小节1</h3>
        <p>霓虹小节1：展示霓虹发光效果。</p>
      </div>
    </div>
  </div>
</div>

<!-- 渐变模块 -->
<div class="module module-gradient" data-type="gradient">
  <div class="module-cover">
    <img class="module-cover-img" src="https://picsum.photos/seed/gradient-cover/600/400">
    <div class="module-cover-text">
      <h2 class="cover-title-gradient">渐变特效模块</h2>
      <p>渐变色随hover动态切换，色彩柔和过渡，整体视觉干净高级。</p>
    </div>
  </div>
  <div class="section-list">
    <div class="section-item section-item-gradient"
         data-action="text"
         data-text-original="渐变小节1：展示渐变过渡效果。"
         data-text-change="渐变小节1：已切换文本。">
      <img class="section-img" src="https://picsum.photos/seed/gradient1/400/300">
      <div class="section-text">
        <h3>渐变小节1</h3>
        <p>渐变小节1：展示渐变过渡效果。</p>
      </div>
    </div>
  </div>
</div>

<!-- 3D模块 → 还原成你最开始喜欢的 3D -->
<div class="module module-3d" data-type="3d">
  <div class="module-cover">
    <img class="module-cover-img" src="https://picsum.photos/seed/3d-cover/600/400">
    <div class="module-cover-text">
      <h2 class="cover-title-3d">3D特效模块</h2>
      <p>3D空间翻转+悬浮效果，还原你最开始喜欢的风格，模块与小节效果完全一致。</p>
    </div>
  </div>
  <div class="section-list">
    <div class="section-item section-item-3d"
         data-action="text"
         data-text-original="3D小节1：展示真实3D悬浮翻转。"
         data-text-change="3D小节1：已切换文本。">
      <img class="section-img" src="https://picsum.photos/seed/3d1/400/300">
      <div class="section-text">
        <h3>3D小节1</h3>
        <p>3D小节1：展示真实3D悬浮翻转。</p>
      </div>
    </div>
  </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
// 粒子背景
particlesJS('particles-js',{
  particles:{
    number:{value:80,density:{enable:true,value_area:800}},
    color:{value:['#0ff','#f0f','#ff0']},
    opacity:{value:0.5,random:true},
    size:{value:2,random:true},
    line_linked:{enable:true,distance:150,color:'#0ff',opacity:0.2,width:1},
    move:{enable:true,speed:1,random:true}
  },
  interactivity:{
    events:{onhover:{enable:true,mode:'grab'},onclick:{enable:true,mode:'push'}}
  }
});

// 视差
window.addEventListener('scroll',()=>{
  const s = window.scrollY;
  document.getElementById('parallax-bg').style.transform = `translateZ(-5px) scale(1.2) translateY(${s*0.3}px)`;
});

// 点击模块展开/收起 + 切换标题
const modules = document.querySelectorAll('.module');
const titleEl = document.getElementById('pageMainTitle');

modules.forEach(mod=>{
  const cover = mod.querySelector('.module-cover');
  const list = mod.querySelector('.section-list');
  const type = mod.dataset.type;
  const title = mod.querySelector('h2').innerText;

  cover.addEventListener('click',()=>{
    list.classList.toggle('show');
    titleEl.className = 'page-title';
    titleEl.classList.add(`title-${type}`);
    titleEl.innerText = title;
    mod.scrollIntoView({behavior:'smooth'});
  });
});

// 小节点击切换文字
document.querySelectorAll('.section-item').forEach(item=>{
  item.addEventListener('click',(e)=>{
    e.stopPropagation();
    const p = item.querySelector('p');
    const orig = item.dataset.textOriginal;
    const chg = item.dataset.textChange;
    p.innerText = p.innerText === orig ? chg : orig;
  });
});
</script>
</body>
</html>
