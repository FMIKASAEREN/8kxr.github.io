<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8KXR - 渐变动效主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            transition: background 1s ease;
        }
        
        body.scrolled {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 80px 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 80px;
            opacity: 0;
            transform: translateY(50px);
            animation: fadeIn 1s ease forwards;
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        
        .header p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }
        
        .gallery-item {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.5s ease;
            opacity: 0;
            transform: scale(0.8);
            animation: popIn 0.8s ease forwards;
        }
        
        .gallery-item:nth-child(1) { animation-delay: 0.2s; }
        .gallery-item:nth-child(2) { animation-delay: 0.4s; }
        .gallery-item:nth-child(3) { animation-delay: 0.6s; }
        .gallery-item:nth-child(4) { animation-delay: 0.8s; }
        
        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .gallery-item:hover img {
            transform: scale(1.1);
        }
        
        .gallery-item .content {
            padding: 20px;
            background: rgba(0,0,0,0.3);
        }
        
        .gallery-item h3 {
            margin-bottom: 10px;
            font-size: 1.2rem;
        }
        
        .gallery-item p {
            opacity: 0.8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>8KXR 的渐变主页</h1>
            <p>滚动页面查看更多动效，hover 图片有惊喜～</p>
        </div>
        
        <div class="gallery">
            <div class="gallery-item">
                <img src="https://picsum.photos/seed/1/800/600" alt="示例图片1">
                <div class="content">
                    <h3>动效卡片 1</h3>
                    <p>图片悬浮缩放 + 卡片上浮阴影</p>
                </div>
            </div>
            <div class="gallery-item">
                <img src="https://picsum.photos/seed/2/800/600" alt="示例图片2">
                <div class="content">
                    <h3>动效卡片 2</h3>
                    <p>延迟入场动画 + 平滑过渡</p>
                </div>
            </div>
            <div class="gallery-item">
                <img src="https://picsum.photos/seed/3/800/600" alt="示例图片3">
                <div class="content">
                    <h3>动效卡片 3</h3>
                    <p>滚动背景渐变 + 文字发光</p>
                </div>
            </div>
            <div class="gallery-item">
                <img src="https://picsum.photos/seed/4/800/600" alt="示例图片4">
                <div class="content">
                    <h3>动效卡片 4</h3>
                    <p>平滑滚动 + 响应式布局</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 滚动改变背景渐变
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            if (scrollY > 200) {
                document.body.classList.add('scrolled');
            } else {
                document.body.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
